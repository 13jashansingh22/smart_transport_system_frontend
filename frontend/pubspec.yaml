name: bus_tracking_system
description: Smart Transport & Bus Tracking System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.5

  # Firebase
  firebase_core: ^2.30.0
  cloud_firestore: ^4.15.0
  firebase_auth: ^4.19.0
  firebase_storage: ^11.7.0

  # Maps + GPS (Tracking System)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.4

  # Google Maps (Navigation Screen)
  google_maps_flutter: ^2.6.0
  google_maps_flutter_android: ^2.8.0
  google_maps_flutter_ios: ^2.6.0

  # Login
  google_sign_in: ^6.2.1

  # Face Verification
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.10.0
  image_picker: ^1.1.2
  flutter_windowmanager: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  # Use an icon-only square source for app icons when available.
  image_path: assets/images/logo.png
  adaptive_icon_background: "#111A24"
  adaptive_icon_foreground: assets/images/logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/